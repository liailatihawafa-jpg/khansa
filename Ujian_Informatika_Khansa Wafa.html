<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Biodata Saya</title>
  <!-- Menghubungkan ke file CSS eksternal-->
  <style>
body {
      background-color:#5d807d;
      text-align:center;/*Membuat konten teks ke tengah*/
      font-family:arial;
     }

     .kotak{
       background-color:#8a9cba;
       width:300px;
       margin:50px auto;/*Kotak ke tengah*/

       border:10px solid white;
     }

     .foto{
        width:100px;
        height:100px;
        border-radius:50%;/*Membuat gambar bulat*/
     }

     /*PERBAIKAN DAFTAR HOBI agar sejajar*/
     ul{
       display:inline-block;/*Membuat area daftar hanya selebar teksnya*/
       text-align:left;  /*Membuat teks di dalam daftar rata kiri (sejajar titik)*/
     }

     /*Mengatur tombol*/
     button{
       background-color:#c7eaff;
       padding:10px;
       cursor:pointer;
     }
     button:hover{
        background-color:#5e2e39;/*Wara sedikit gelap saat tombol disentuh mouse*/

</head>
<body>

  <div class="kotak">

   <script>
